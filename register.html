<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Cliente - Patitas Felices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>
    <main class="container py-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h1 class="h3 mb-3">Registro de Cliente</h1>

                <form id="registerForm">
                    <div class="mb-3">
                        <label>Nombre completo:</label>
                        <input class="form-control" type="text" id="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label>Correo electrónico:</label>
                        <input class="form-control" type="email" id="correo" required>
                    </div>

                    <div class="mb-3">
                        <label>Contraseña:</label>
                        <input class="form-control" type="password" id="password" required>
                    </div>

                    <div class="mb-3">
                        <label>Teléfono:</label>
                        <input class="form-control" type="text" id="telefono">
                    </div>

                    <div class="mb-3">
                        <label>Dirección:</label>
                        <textarea class="form-control" id="direccion"></textarea>
                    </div>

                    <div id="mensajeRegistro"></div>

                    <button class="btn btn-primary w-100" type="submit">Registrarme</button>
                    <a href="index.html" class="btn btn-link w-100">Ya tengo cuenta</a>
                </form>
            </div>
        </div>
    </main>

    <script src="./public/js/register.js"></script>
</body>
</html>
